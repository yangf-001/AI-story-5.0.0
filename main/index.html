<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI故事生成器</title>
    <link rel="stylesheet" href="style.css">
    <!-- PWA相关元标签 -->
    <meta name="description" content="一个功能强大的AI故事生成器应用">
    <meta name="theme-color" content="#3B82F6">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="AI故事">
    <link rel="manifest" href="../manifest.json">
    <link rel="icon" href="https://trae-api-cn.mchost.guru/api/ide/v1/text_to_image?prompt=AI%20story%20generator%20icon%20with%20book%20and%20robot%20illustration%2C%20modern%20flat%20design%2C%20blue%20and%20purple%20colors&image_size=square" type="image/png">
    <link rel="apple-touch-icon" href="https://trae-api-cn.mchost.guru/api/ide/v1/text_to_image?prompt=AI%20story%20generator%20icon%20with%20book%20and%20robot%20illustration%2C%20modern%20flat%20design%2C%20blue%20and%20purple%20colors&image_size=square">
</head>
<body>
    <header class="navbar">
        <div style="display: flex; align-items: center; gap: var(--spacing-md); width: 100%; justify-content: space-between; flex-wrap: wrap;">
            <div style="display: flex; align-items: center; gap: var(--spacing-md); flex-shrink: 0;">
                <h1 style="font-size: 1.5rem;">AI故事生成器</h1>
            </div>
            <div style="display: flex; align-items: center; gap: var(--spacing-md);">
                <div class="nav-buttons">
                    <button onclick="window.location.href='../features/api-config/index.html'">API配置</button>
                </div>
                <div style="font-size: var(--font-size-xs); color: white; opacity: 0.8; margin-left: var(--spacing-sm); padding: 2px 8px; background-color: rgba(0, 0, 0, 0.2); border-radius: var(--border-radius-sm);">
                    v3.2.0
                </div>
            </div>
        </div>
    </header>
    <style>
        @media (max-width: 768px) {
            .navbar {
                padding: 10px;
            }
            .navbar h1 {
                font-size: 1.2rem !important;
            }
            .navbar button {
                font-size: 0.8rem !important;
                padding: 6px 12px !important;
            }
            #currentTime {
                font-size: 1rem !important;
            }
        }
        @media (max-width: 480px) {
            .navbar > div {
                flex-direction: column;
                align-items: center;
                text-align: center;
            }
            .navbar > div > div {
                width: 100%;
                margin: 5px 0;
            }
            .nav-buttons {
                width: 100%;
                justify-content: center !important;
            }
            #currentTime {
                font-size: 0.9rem !important;
            }
        }
    </style>

    <main class="main-content">
        <section class="worlds-section">
            <h2>剧情世界</h2>
            <div id="worlds-list" class="worlds-grid">
                <!-- 剧情世界卡片将通过JavaScript动态生成 -->
            </div>
            <div style="display: flex; gap: var(--spacing-md); justify-content: center; flex-wrap: wrap;">
                <button id="add-world-btn" class="add-world-btn" onclick="window.location.href='../features/world-management/create.html'">添加新剧情世界</button>
                <button class="add-world-btn" onclick="importWorld()">导入世界</button>
                <button class="add-world-btn" onclick="exportAllWorlds()">导出全部</button>
            </div>
        </section>
    </main>

    <input type="file" id="import-file-input" accept=".json" style="display: none;" onchange="handleImportFile(event)">

    <script src="storage.js"></script>
    <script src="helpers.js"></script>
    <script src="main.js"></script>
    <!-- Service Worker注册 -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('../service-worker.js')
                    .then((registration) => {
                        console.log('Service Worker 注册成功:', registration.scope);
                    })
                    .catch((error) => {
                        console.log('Service Worker 注册失败:', error);
                    });
            });
        }
    </script>
</body>
</html>
