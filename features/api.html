<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API配置 - 故事生成器 4.0</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg-primary: #f8f9fa;
            --bg-secondary: #ffffff;
            --bg-card: #ffffff;
            --bg-hover: #e9ecef;
            --text-primary: #212529;
            --text-secondary: #6c757d;
            --text-muted: #adb5bd;
            --accent: #6366f1;
            --accent-hover: #4f46e5;
            --border: rgba(0, 0, 0, 0.1);
            --danger: #ef4444;
            --success: #22c55e;
            --warning: #f59e0b;
            --shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--bg-primary);
            min-height: 100vh;
            color: var(--text-primary);
            line-height: 1.6;
            padding: 40px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 8px;
        }

        .subtitle {
            color: var(--text-secondary);
            margin-bottom: 30px;
        }

        .back-btn {
            display: inline-block;
            padding: 10px 20px;
            background: var(--bg-hover);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-secondary);
            text-decoration: none;
            margin-bottom: 20px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .back-btn:hover {
            background: var(--bg-secondary);
            color: var(--text-primary);
        }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: var(--shadow);
        }

        .card h2 {
            font-size: 1.1rem;
            margin-bottom: 16px;
            color: var(--text-primary);
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 6px;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px 16px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 0.95rem;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--accent);
        }

        .form-group input::placeholder {
            color: var(--text-muted);
        }

        .btn {
            padding: 12px 24px;
            border-radius: 8px;
            border: none;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary {
            background: var(--accent);
            color: white;
        }

        .btn-primary:hover {
            background: var(--accent-hover);
            transform: translateY(-2px);
        }

        .status {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 0.9rem;
        }

        .status.success {
            background: rgba(34, 197, 94, 0.1);
            color: var(--success);
            border: 1px solid rgba(34, 197, 94, 0.3);
        }

        .status.error {
            background: rgba(239, 68, 68, 0.1);
            color: var(--danger);
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .tip {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 6px;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="../index.html" class="back-btn">← 返回首页</a>
        
        <h1>API 配置</h1>
        <p class="subtitle">配置 AI 服务商密钥</p>

        <div id="status"></div>

        <div class="card">
            <h2>选择服务商</h2>
            <div class="form-group">
                <label>AI 服务商</label>
                <select id="provider" onchange="updateProvider()">
                    <option value="deepseek">DeepSeek</option>
                    <option value="openai">OpenAI</option>
                    <option value="anthropic">Anthropic (Claude)</option>
                    <option value="custom">自定义 API</option>
                </select>
            </div>
        </div>

        <div class="card" id="configCard">
            <h2>API 配置</h2>
            
            <div class="form-group">
                <label>API Key</label>
                <input type="password" id="apiKey" placeholder="输入 API Key">
            </div>

            <div class="form-group" id="endpointGroup">
                <label>API Endpoint</label>
                <input type="text" id="apiEndpoint" placeholder="https://api.deepseek.com">
                <p class="tip" id="endpointTip">DeepSeek 默认: https://api.deepseek.com</p>
            </div>

            <div class="form-group">
                <label>模型</label>
                <input type="text" id="model" placeholder="deepseek-chat">
            </div>

            <button class="btn btn-primary" onclick="saveConfig()">保存配置</button>
        </div>

        <div class="card">
            <h2>测试连接</h2>
            <button class="btn btn-primary" onclick="testConnection()">测试 API</button>
            <div id="testResult" style="margin-top: 12px;"></div>
        </div>
    </div>

    <script src="../js/mini-ai.js"></script>
    <script>
        const config = {
            deepseek: {
                endpoint: 'https://api.deepseek.com',
                model: 'deepseek-chat',
                tip: 'DeepSeek 默认: https://api.deepseek.com'
            },
            openai: {
                endpoint: 'https://api.openai.com/v1',
                model: 'gpt-3.5-turbo',
                tip: 'OpenAI 默认: https://api.openai.com/v1'
            },
            anthropic: {
                endpoint: 'https://api.anthropic.com/v1',
                model: 'claude-3-haiku-20240307',
                tip: 'Anthropic 默认: https://api.anthropic.com/v1'
            },
            custom: {
                endpoint: '',
                model: '',
                tip: '输入您的自定义 API 地址'
            }
        };

        function init() {
            const provider = localStorage.getItem('apiProvider') || 'deepseek';
            document.getElementById('provider').value = provider;
            
            const savedKey = localStorage.getItem('apiKey');
            const savedEndpoint = localStorage.getItem('apiEndpoint');
            const savedModel = localStorage.getItem('apiModel');

            if (savedKey) document.getElementById('apiKey').value = savedKey;
            if (savedEndpoint) document.getElementById('apiEndpoint').value = savedEndpoint;
            if (savedModel) document.getElementById('model').value = savedModel;

            updateProvider();
        }

        function updateProvider() {
            const provider = document.getElementById('provider').value;
            const conf = config[provider];
            
            document.getElementById('apiEndpoint').value = conf.endpoint;
            document.getElementById('model').value = conf.model;
            document.getElementById('endpointTip').textContent = conf.tip;
        }

        function saveConfig() {
            const provider = document.getElementById('provider').value;
            const apiKey = document.getElementById('apiKey').value.trim();
            const endpoint = document.getElementById('apiEndpoint').value.trim();
            const model = document.getElementById('model').value.trim();

            if (!apiKey) {
                showStatus('请输入 API Key', 'error');
                return;
            }

            localStorage.setItem('apiProvider', provider);
            localStorage.setItem('apiKey', apiKey);
            localStorage.setItem('apiEndpoint', endpoint);
            localStorage.setItem('apiModel', model);

            showStatus('配置已保存！', 'success');
        }

        function showStatus(msg, type) {
            document.getElementById('status').innerHTML = '<div class="status ' + type + '">' + msg + '</div>';
        }

        async function testConnection() {
            const btn = event.target;
            btn.disabled = true;
            btn.textContent = '测试中...';
            
            const resultDiv = document.getElementById('testResult');
            resultDiv.innerHTML = '';

            const apiKey = localStorage.getItem('apiKey');
            const endpoint = localStorage.getItem('apiEndpoint');
            const model = localStorage.getItem('apiModel');

            if (!apiKey) {
                resultDiv.innerHTML = '<div class="status error">请先保存 API Key</div>';
                btn.disabled = false;
                btn.textContent = '测试 API';
                return;
            }

            try {
                const response = await fetch(endpoint + '/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + apiKey
                    },
                    body: JSON.stringify({
                        model: model,
                        messages: [{ role: 'user', content: 'Hi' }],
                        max_tokens: 10
                    })
                });

                if (response.ok) {
                    resultDiv.innerHTML = '<div class="status success">✓ 连接成功！API 正常工作</div>';
                } else {
                    const err = await response.text();
                    resultDiv.innerHTML = '<div class="status error">✗ 连接失败: ' + response.status + '</div>';
                }
            } catch (e) {
                resultDiv.innerHTML = '<div class="status error">✗ 连接失败: ' + e.message + '</div>';
            }

            btn.disabled = false;
            btn.textContent = '测试 API';
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
