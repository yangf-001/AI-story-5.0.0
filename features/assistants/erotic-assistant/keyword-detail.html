<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>关键词详情</title>
    <link rel="stylesheet" href="../../../main/style.css">
    <style>
        /* 主内容区调整 */
        .main-content {
            padding: var(--spacing-xl);
            max-width: 800px;
            margin: 0 auto;
            min-height: calc(100vh - 160px);
            margin-top: 100px; /* 为固定导航栏留出空间 */
        }

        .header {
            margin-bottom: var(--spacing-xl);
        }

        .header h1 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: var(--spacing-sm);
            color: #BE185D;
        }

        .back-link {
            display: inline-block;
            margin-bottom: var(--spacing-md);
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 500;
        }

        .back-link:hover {
            text-decoration: underline;
        }

        .detail-panel {
            background: linear-gradient(135deg, #FEF2F2, #FEF7FF);
            border-radius: var(--border-radius-lg);
            padding: var(--spacing-xl);
            box-shadow: 0 4px 15px rgba(236, 72, 153, 0.2);
            border: 2px solid #F9A8D4;
            margin-bottom: var(--spacing-lg);
        }

        .detail-panel h2 {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: var(--spacing-lg);
            color: #BE185D;
        }

        .detail-item {
            margin-bottom: var(--spacing-md);
            padding-bottom: var(--spacing-md);
            border-bottom: 1px solid #FECDD3;
        }

        .detail-item:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }

        .detail-label {
            font-weight: 600;
            color: #BE185D;
            margin-bottom: var(--spacing-xs);
        }

        .detail-value {
            font-size: 1.125rem;
            line-height: 1.5;
        }

        .btn-erotic {
            background: linear-gradient(135deg, #F472B6, #D946EF);
            color: white;
            border: none;
            padding: var(--spacing-sm) var(--spacing-md);
            border-radius: var(--border-radius-md);
            cursor: pointer;
            transition: all var(--transition-fast);
            font-size: 1rem;
            font-weight: 500;
        }

        .btn-erotic:hover {
            background: linear-gradient(135deg, #D946EF, #F472B6);
            transform: translateY(-1px);
            box-shadow: 0 4px 15px rgba(236, 72, 153, 0.4);
        }

        .btn-outline {
            background: transparent;
            color: var(--primary-color);
            border: 1px solid var(--primary-color);
            padding: var(--spacing-sm) var(--spacing-md);
            border-radius: var(--border-radius-md);
            cursor: pointer;
            transition: all var(--transition-fast);
            font-size: 1rem;
            font-weight: 500;
        }

        .btn-outline:hover {
            background: var(--primary-color);
            color: white;
        }

        .action-buttons {
            display: flex;
            gap: var(--spacing-md);
            margin-top: var(--spacing-lg);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            z-index: 1001;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: linear-gradient(135deg, #FEF2F2, #FEF7FF);
            padding: var(--spacing-xl);
            border-radius: var(--border-radius-lg);
            box-shadow: 0 10px 30px rgba(236, 72, 153, 0.4);
            max-width: 400px;
            width: 100%;
            animation: fadeIn 0.5s ease;
        }

        .modal-content h3 {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: var(--spacing-lg);
            color: #BE185D;
        }

        .modal-actions {
            display: flex;
            gap: var(--spacing-md);
            justify-content: flex-end;
            margin-top: var(--spacing-lg);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.9);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .form-group {
            margin-bottom: var(--spacing-md);
        }

        .form-group label {
            display: block;
            margin-bottom: var(--spacing-xs);
            font-weight: 500;
            color: #BE185D;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: var(--spacing-md);
            border: 1px solid #FECDD3;
            border-radius: var(--border-radius-md);
            font-size: 1rem;
            background-color: white;
            color: var(--text-color);
            transition: border-color var(--transition-fast);
            outline: none;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            border-color: #EC4899;
            box-shadow: 0 0 0 3px rgba(236, 72, 153, 0.1);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 120px;
        }

        .detail-input {
            width: 100%;
            padding: var(--spacing-md);
            border: 1px solid #FECDD3;
            border-radius: var(--border-radius-md);
            font-size: 1.125rem;
            background-color: white;
            color: var(--text-color);
            transition: border-color var(--transition-fast);
            outline: none;
        }

        .detail-input:focus {
            border-color: #EC4899;
            box-shadow: 0 0 0 3px rgba(236, 72, 153, 0.1);
        }

        .plays-textarea {
            width: 100%;
            min-height: 120px;
            padding: var(--spacing-md);
            border: 1px solid #FECDD3;
            border-radius: var(--border-radius-md);
            font-size: 1rem;
            background-color: white;
            color: var(--text-color);
            transition: border-color var(--transition-fast);
            outline: none;
            resize: vertical;
        }

        .plays-textarea:focus {
            border-color: #EC4899;
            box-shadow: 0 0 0 3px rgba(236, 72, 153, 0.1);
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .main-content {
                padding: var(--spacing-md);
            }

            .detail-panel {
                padding: var(--spacing-lg);
            }

            .action-buttons {
                flex-direction: column;
            }

            .modal-content {
                margin: var(--spacing-md);
                max-width: calc(100% - 2 * var(--spacing-md));
            }
        }
    </style>
</head>
<body>
    <header class="navbar">
        <div style="display: flex; align-items: center; gap: var(--spacing-lg);">
            <button onclick="window.location.href='settings.html'">返回设置</button>
            <h1>关键词详情</h1>
        </div>
    </header>

    <main class="main-content">
        <div class="header">
            <a href="settings.html" class="back-link">← 返回色色小助手设置</a>
            <h1>关键词详情</h1>
            <p>查看和编辑关键词的详细信息</p>
        </div>

        <div class="detail-panel" id="keyword-detail-panel">
            <h2>关键词信息</h2>
            <div class="detail-item">
                <div class="detail-label">关键词</div>
                <input type="text" id="detail-keyword" class="detail-input" placeholder="输入关键词...">
            </div>
            <div class="detail-item">
                <div class="detail-label">玩法</div>
                <input type="text" id="detail-play" class="detail-input" placeholder="输入玩法...">
            </div>
            <div class="detail-item">
                <div class="detail-label">触发词</div>
                <input type="text" id="detail-trigger" class="detail-input" placeholder="输入触发词...">
            </div>
            <div class="detail-item">
                <div class="detail-label">描述</div>
                <textarea id="detail-description" class="plays-textarea" placeholder="输入描述..."></textarea>
            </div>
        </div>

        <div class="action-buttons">
            <button id="save-keyword" class="btn-erotic">保存修改</button>
            <button id="delete-keyword" class="btn-outline">删除关键词</button>
            <button id="back-btn" class="btn-outline">返回</button>
        </div>
    </main>



    <script src="../../../main/storage.js"></script>
    <script src="../../../main/helpers.js"></script>
    <script>
        class KeywordDetailModule {
            constructor() {
                this.currentWorldId = localStorage.getItem('currentWorldId');
                this.currentKeywordId = localStorage.getItem('currentKeywordId');
                this.assistant = this.getEroticAssistant();
                this.init();
            }

            init() {
                if (!this.currentWorldId) {
                    window.location.href = '../index.html';
                    return;
                }

                if (!this.currentKeywordId) {
                    window.location.href = 'settings.html';
                    return;
                }

                this.loadKeywordDetail();
                this.bindEvents();
            }

            getEroticAssistant() {
                const storedAssistants = localStorage.getItem(`assistants_${this.currentWorldId}`);
                if (storedAssistants) {
                    const assistants = JSON.parse(storedAssistants);
                    return assistants.find(a => a.id === 'erotic-assistant');
                }
                return null;
            }

            loadKeywordDetail() {
                if (!this.assistant || !this.assistant.settings.keywords) {
                    this.showMessage('关键词不存在');
                    return;
                }

                const keyword = this.assistant.settings.keywords.find(k => k.id === this.currentKeywordId);
                if (!keyword) {
                    this.showMessage('关键词不存在');
                    return;
                }

                // 加载数据到表单
                document.getElementById('detail-keyword').value = keyword.word;
                document.getElementById('detail-play').value = keyword.cg.玩法;
                document.getElementById('detail-trigger').value = keyword.cg.触发词;
                document.getElementById('detail-description').value = keyword.cg.描述;
            }

            bindEvents() {
                // 保存按钮
                document.getElementById('save-keyword').addEventListener('click', () => this.saveKeyword());

                // 删除按钮
                document.getElementById('delete-keyword').addEventListener('click', () => this.deleteKeyword());

                // 返回按钮
                document.getElementById('back-btn').addEventListener('click', () => {
                    window.location.href = 'settings.html';
                });
            }

            saveKeyword() {
                const word = document.getElementById('detail-keyword').value.trim();
                const play = document.getElementById('detail-play').value.trim();
                const trigger = document.getElementById('detail-trigger').value.trim();
                const description = document.getElementById('detail-description').value.trim();

                if (!word || !play || !trigger || !description) {
                    alert('请填写所有字段');
                    return;
                }

                const cg = {
                    玩法: play,
                    触发词: trigger,
                    描述: description
                };

                const index = this.assistant.settings.keywords.findIndex(k => k.id === this.currentKeywordId);
                if (index >= 0) {
                    this.assistant.settings.keywords[index] = {
                        ...this.assistant.settings.keywords[index],
                        word,
                        cg
                    };

                    this.saveAssistant(this.assistant);
                    this.showMessage('关键词保存成功');
                }
            }

            deleteKeyword() {
                if (confirm('确定要删除这个关键词吗？')) {
                    const index = this.assistant.settings.keywords.findIndex(k => k.id === this.currentKeywordId);
                    if (index >= 0) {
                        this.assistant.settings.keywords.splice(index, 1);
                        this.saveAssistant(this.assistant);
                        window.location.href = 'settings.html';
                    }
                }
            }

            saveAssistant(assistant) {
                const storedAssistants = localStorage.getItem(`assistants_${this.currentWorldId}`);
                let assistants = [];
                if (storedAssistants) {
                    assistants = JSON.parse(storedAssistants);
                }

                const index = assistants.findIndex(a => a.id === assistant.id);
                if (index >= 0) {
                    assistants[index] = assistant;
                } else {
                    assistants.push(assistant);
                }

                localStorage.setItem(`assistants_${this.currentWorldId}`, JSON.stringify(assistants));
            }

            showMessage(message) {
                const messageElement = document.createElement('div');
                messageElement.className = 'message';
                messageElement.textContent = message;
                messageElement.style.padding = 'var(--spacing-sm)';
                messageElement.style.backgroundColor = 'rgba(236, 72, 153, 0.1)';
                messageElement.style.border = '1px solid rgba(236, 72, 153, 0.3)';
                messageElement.style.borderRadius = 'var(--border-radius)';
                messageElement.style.margin = 'var(--spacing-sm) 0';
                messageElement.style.textAlign = 'center';
                messageElement.style.color = '#BE185D';

                const container = document.querySelector('.header') || document.body;
                container.appendChild(messageElement);

                // 3秒后自动移除消息
                setTimeout(() => {
                    messageElement.remove();
                }, 3000);
            }
        }

        // 初始化模块
        document.addEventListener('DOMContentLoaded', function() {
            new KeywordDetailModule();
        });
    </script>
</body>
</html>
