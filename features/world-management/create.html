<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>创建新剧情世界</title>
    <link rel="stylesheet" href="../../main/style.css">
    <!-- PWA相关元标签 -->
    <meta name="description" content="AI故事生成器创建新剧情世界页面">
    <meta name="theme-color" content="#3B82F6">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="AI故事">
    <link rel="manifest" href="../../manifest.json">
    <link rel="icon" href="https://trae-api-cn.mchost.guru/api/ide/v1/text_to_image?prompt=AI%20story%20generator%20icon%20with%20book%20and%20robot%20illustration%2C%20modern%20flat%20design%2C%20blue%20and%20purple%20colors&image_size=square" type="image/png">
    <link rel="apple-touch-icon" href="https://trae-api-cn.mchost.guru/api/ide/v1/text_to_image?prompt=AI%20story%20generator%20icon%20with%20book%20and%20robot%20illustration%2C%20modern%20flat%20design%2C%20blue%20and%20purple%20colors&image_size=square">
</head>
<body>
    <header class="navbar">
        <div style="display: flex; align-items: center; gap: var(--spacing-lg);">
            <button onclick="window.location.href='../../main/index.html'">返回主页面</button>
            <h1>创建新剧情世界</h1>
        </div>
    </header>

    <main class="main-content">
        <form id="create-world-form">
            <div class="form-group">
                <label for="world-name">世界名称</label>
                <input type="text" id="world-name" name="world-name" placeholder="请输入剧情世界名称" required>
            </div>

            <div class="form-group">
                <label for="world-description">世界描述</label>
                <textarea id="world-description" name="world-description" placeholder="请输入剧情世界描述"></textarea>
            </div>

            <h3>初始设置</h3>
            
            <div class="form-group">
                <label for="story-background">故事背景</label>
                <textarea id="story-background" name="story-background" placeholder="请输入故事背景"></textarea>
            </div>

            <div class="form-group">
                <label for="worldview">世界观设定</label>
                <textarea id="worldview" name="worldview" placeholder="请输入世界观设定"></textarea>
            </div>

            <div class="form-group">
                <label for="initial-time">初始剧情时间</label>
                <input type="date" id="initial-time" name="initial-time" value="2026-02-24">
            </div>

            <div style="display: flex; gap: var(--spacing-lg); margin: var(--spacing-xl) 0;">
                <button type="submit" class="btn-primary">创建</button>
                <button type="button" onclick="window.location.href='../../main/index.html'" class="btn-outline">取消</button>
            </div>
        </form>
    </main>

    <script src="../../main/storage.js"></script>
    <script src="create.js"></script>
    <!-- Service Worker注册 -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('../../service-worker.js')
                    .then((registration) => {
                        console.log('Service Worker 注册成功:', registration.scope);
                    })
                    .catch((error) => {
                        console.log('Service Worker 注册失败:', error);
                    });
            });
        }
    </script>
</body>
</html>
