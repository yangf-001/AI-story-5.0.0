        function openStoryReader() {
            const reader = document.getElementById('storyReader');
            const content = document.getElementById('storyReaderContent');
            const footer = document.getElementById('storyReaderFooter');
            const title = document.getElementById('storyReaderTitle');
            
            window.DataManager?.init(currentWorldId);
            let currentStory = window.DataManager?.getCurrentStory(currentWorldId);
            
            // 如果没有进行中的故事，从历史故事继续
            if (!currentStory || !currentStory.scenes) {
                const stories = window.DataManager?.getStories(currentWorldId) || [];
                if (stories.length > 0) {
                    showStoryLoading('正在从历史故事继续...');
                    window.StoryEngine.init(currentWorldId);
                    window.StoryEngine.startNew({ mainCharacters: [] }).then(story => {
                        hideStoryLoading();
                        currentStory = story;
                        renderStoryReader(currentStory, content, footer, title);
                        reader.style.display = 'flex';
                    }).catch(err => {
                        hideStoryLoading();
                        showNotification('继续故事失败: ' + err.message, 'error');
                    });
                    return;
                } else {
                    showNotification('没有进行中的故事', 'error');
                    return;
                }
            }
            
            renderStoryReader(currentStory, content, footer, title);
            reader.style.display = 'flex';
        }

        function renderStoryReader(currentStory, content, footer, title) {
            console.log('当前故事场景:', currentStory.scenes);
            console.log('第一个场景的选项:', currentStory.scenes[0]?.choices);
            
            title.textContent = currentStory.mode === '小说' ? '小说阅读' : '互动故事';
            
            const goals = window.GoalManager?.getGoals(currentWorldId) || [];
            const activeGoals = goals.filter(g => g.status === 'active');
            
            const goalsHtml = activeGoals.length > 0 ? `
                <div class="story-goals" style="background: var(--bg-tertiary); border-radius: 8px; padding: 12px; margin-bottom: 16px;">
                    <div style="font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 8px;">🎯 当前目标</div>
                    ${activeGoals.slice(0, 3).map(g => `
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px;">
                            <span>${g.name}</span>
                            <span style="color: ${g.progress >= g.target ? '#4ade80' : '#fbbf24'};">${g.progress || 0}/${g.target || 1}</span>
                        </div>
                    `).join('')}
                    <button class="btn btn-secondary" onclick="showStoryGoals()" style="margin-top: 8px; width: 100%;">查看全部目标</button>
                </div>
            ` : '';
            
            let scenesHtml = currentStory.scenes.map((scene, sceneIdx) => `
                <div class="story-reader-scene">
                    <div class="story-reader-text">${scene.content}</div>
                    ${scene.choices && scene.choices.length > 0 ? `
                        <div class="story-reader-choices">
                            ${scene.choices.map((choice, idx) => `
                                <button class="btn btn-secondary" onclick="makeChoiceInReader('${scene.id}', ${idx})">${typeof choice === 'object' ? choice.text : choice}</button>
                            `).join('')}
                            <div class="custom-choice-input" style="margin-top: 12px; display: flex; gap: 8px;">
                                <input type="text" id="customChoice_${scene.id}" placeholder="自定义选项..." style="flex: 1; padding: 8px 12px; border: 1px solid var(--border); border-radius: 6px; background: var(--bg-primary); color: var(--text-primary);">
                                <button class="btn" onclick="submitCustomChoice('${scene.id}')">确定</button>
                            </div>
                        </div>
                    ` : `
                        <div class="custom-choice-input" style="margin-top: 12px; display: flex; gap: 8px;">
                            <input type="text" id="customChoice_${scene.id}" placeholder="输入你想做的事情..." style="flex: 1; padding: 8px 12px; border: 1px solid var(--border); border-radius: 6px; background: var(--bg-primary); color: var(--text-primary);">
                            <button class="btn" onclick="submitCustomChoice('${scene.id}')">确定</button>
                        </div>
                    `}
                </div>
            `).join('');
            
            content.innerHTML = goalsHtml + scenesHtml;
            
            footer.innerHTML = `
                <button class="btn" onclick="continueStoryInReader()">继续故事</button>
                <button class="btn btn-secondary" onclick="showIntimateInReader()">💕 亲密互动</button>
                <button class="btn btn-secondary" onclick="endStory()">结束故事</button>
            `;
        }

        function showStoryCharacters() {
            if (!currentWorldId) return;
            
            window.DataManager?.init(currentWorldId);
            const mainChars = window.DataManager?.getMainCharacters(currentWorldId) || [];
            
            if (mainChars.length === 0) {
                showNotification('暂无角色', 'error');
                return;
            }
            
            const html = mainChars.map(char => {
                const isMale = char.baseProfile?.gender === '男性';
                return `
                <div class="character-mini" onclick="CharacterPanelManager?.openPanel('${currentWorldId}', '${char.id}')" style="cursor: pointer; padding: 12px; margin-bottom: 12px; background: var(--bg-tertiary); border-radius: 8px;">
                    <div class="avatar" style="font-size: 2rem;">${char.avatar || '👤'}</div>
                    <div class="info" style="flex: 1;">
                        <div class="name" style="font-weight: bold;">${char.name} ${char.baseProfile?.age ? char.baseProfile.age + '岁' : ''}</div>
                        <div class="status" style="font-size: 0.85rem; color: var(--text-secondary);">${char.baseProfile?.personality || '未设定'}</div>
                    </div>
                    <div style="text-align: right;">
                        <div style="color: #4ade80;">❤️ ${char.stats?.health || 100}</div>
                        <div style="color: #60a5fa;">⚡ ${char.stats?.energy || 100}</div>
                        <div style="color: #f472b6;">💕 ${char.stats?.affection || 50}</div>
                        <div style="color: #fb923c;">🔥 ${char.stats?.arousal || 0}</div>
                        ${isMale ? `<div style="color: #a855f7;">💜 ${char.stats?.erection || 0}</div>` : ''}
                    </div>
                </div>
            `}).join('');
            
            document.getElementById('modalTitle').textContent = '角色状态';
            document.getElementById('modalBody').innerHTML = html;
            document.getElementById('modalOverlay').classList.add('active');
        }

        function showStoryGoals() {
            if (!currentWorldId) return;
            
            window.DataManager?.init(currentWorldId);
            const goals = window.GoalManager?.getGoals(currentWorldId) || [];
            
            if (goals.length === 0) {
                showNotification('暂无目标', 'error');
                return;
            }
            
            const html = goals.map(goal => `
                <div style="padding: 12px; margin-bottom: 12px; background: var(--bg-tertiary); border-radius: 8px;">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
                        <span style="font-weight: bold;">${goal.name}</span>
                        <span style="color: ${goal.status === 'completed' ? '#4ade80' : '#fbbf24'};">${goal.status === 'completed' ? '已完成' : '进行中'}</span>
                    </div>
                    <div style="font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 8px;">${goal.description || ''}</div>
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <div style="flex: 1; background: var(--bg-primary); height: 8px; border-radius: 4px; margin-right: 12px; overflow: hidden;">
                            <div style="width: ${((goal.progress || 0) / (goal.target || 1)) * 100}%; background: ${goal.status === 'completed' ? '#4ade80' : '#3b82f6'}; height: 100%;"></div>
                        </div>
                        <span style="font-size: 0.85rem;">${goal.progress || 0}/${goal.target || 1}</span>
                    </div>
                </div>
            `).join('');
            
            document.getElementById('modalTitle').textContent = '🎯 目标追踪';
            document.getElementById('modalBody').innerHTML = html;
            document.getElementById('modalOverlay').classList.add('active');
        }

        function closeStoryReader() {
            document.getElementById('storyReader').style.display = 'none';
            showPage('story');
        }

        function showIntimateInReader() {
            const reader = document.getElementById('storyReader');
            if (reader && reader.style.display !== 'none') {
                reader.style.display = 'none';
            }

            if (!currentWorldId) {
                showNotification('请先选择一个世界', 'error');
                return;
            }

            const mainChars = window.DataManager?.getMainCharacters(currentWorldId) || [];
            if (mainChars.length === 0) {
                showNotification('请先添加角色', 'error');
                return;
            }

            window.currentHentaiCharacters = mainChars;
            // 初始化HentaiSystemV3
            if (window.HentaiSystemV3) {
                window.HentaiSystemV3.init(currentWorldId);
            }
            const html = window.HentaiSystemV3?.renderInteractionPanel(currentWorldId, mainChars);
            
            const modalTitle = document.getElementById('modalTitle');
            const modalBody = document.getElementById('modalBody');
            const modalOverlay = document.getElementById('modalOverlay');
            
            if (!modalTitle || !modalBody || !modalOverlay) {
                showNotification('界面加载中，请稍后重试', 'error');
                return;
            }
            
            modalTitle.textContent = '💕 亲密互动';
            modalBody.innerHTML = html;
            modalOverlay.classList.add('active');
        }

        window.HentaiSceneCallback = function(content) {
            closeModal();
            
            window.DataManager?.init(currentWorldId);
            const currentStory = window.DataManager?.getCurrentStory(currentWorldId);
            
            if (currentStory) {
                const newScene = {
                    id: generateId(),
                    storyId: currentStory.id,
                    time: new Date().toISOString(),
                    content: content,
                    choices: [],
                    characters: window.currentHentaiCharacters?.map(c => c.id) || [],
                    location: '亲密互动中',
                    mood: '亲密'
                };
                
                currentStory.scenes.push(newScene);
                window.DataManager.saveCurrentStory(currentWorldId, currentStory);
                
                window.StoryEngine?.init(currentWorldId);
                window.StoryEngine?._updateCharacterStatsFromStory?.(content);
                
                openStoryReader();
            } else {
                const storyContainer = document.getElementById('storyReaderContent');
                if (storyContainer) {
                    storyContainer.innerHTML += `<div class="story-reader-scene"><div class="story-reader-text">${content}</div></div>`;
                    storyContainer.scrollTop = storyContainer.scrollHeight;
                }
            }
            showNotification('互动场景已添加到故事中', 'success');
        };

        function continueStoryInReader() {
            if (!currentWorldId) return;

            showStoryLoading('正在生成下一段故事...');
            window.DataManager.init(currentWorldId);
            window.StoryEngine.init(currentWorldId);

            window.StoryEngine.continue('请继续故事').then(scene => {
                hideStoryLoading();
                if (scene) {
                    showNotification('故事已更新！', 'success');
                    openStoryReader();
                } else {
                    showNotification('继续故事失败', 'error');
                }
            }).catch(err => {
                hideStoryLoading();
                showNotification('继续失败: ' + err.message, 'error');
            });
        }

        function makeChoiceInReader(sceneId, choiceIndex) {
            if (!currentWorldId) return;

            const currentStory = window.DataManager?.getCurrentStory(currentWorldId);
            if (!currentStory) return;

            const scene = currentStory.scenes.find(s => s.id == sceneId);
            if (!scene || !scene.choices || !scene.choices[choiceIndex]) return;

            const choiceObj = scene.choices[choiceIndex];
            const userChoice = typeof choiceObj === 'object' ? choiceObj.text : choiceObj;

            showStoryLoading('正在生成...');
            window.DataManager.init(currentWorldId);
            window.StoryEngine.init(currentWorldId);

            window.StoryEngine.continue(userChoice).then(newScene => {
                hideStoryLoading();
                if (newScene) {
                    showNotification('故事已更新！', 'success');
                    openStoryReader();
                }
            }).catch(err => {
                hideStoryLoading();
                showNotification('选择失败: ' + err.message, 'error');
            });
        }

        function submitCustomChoice(sceneId) {
            const input = document.getElementById('customChoice_' + sceneId);
            if (!input) return;
            
            const userChoice = input.value.trim();
            if (!userChoice) {
                showNotification('请输入选项内容', 'error');
                return;
            }
            
            showStoryLoading('正在生成...');
            window.DataManager.init(currentWorldId);
            window.StoryEngine.init(currentWorldId);

            window.StoryEngine.continue(userChoice).then(newScene => {
                hideStoryLoading();
                if (newScene) {
                    showNotification('故事已更新！', 'success');
                    openStoryReader();
                }
            }).catch(err => {
                hideStoryLoading();
                showNotification('选择失败: ' + err.message, 'error');
            });
        }

        function showAddCharacterModal() {
            if (!currentWorldId) {
                showNotification('请先选择一个世界', 'error');
                return;
            }
            
            document.getElementById('modalTitle').textContent = '添加主角';
            document.getElementById('modalBody').innerHTML = `
                <div class="form-group">
                    <label>角色名称</label>
                    <input type="text" id="charName" placeholder="输入角色名称">
                </div>
                
                <div class="form-group">
                    <label>年龄</label>
                    <input type="number" id="charAge" placeholder="18" value="18">
                </div>
                
                <div class="form-group">
                    <label>性别</label>
                    <select id="charGender" style="width: 100%; padding: 10px; border: 1px solid var(--border-color); border-radius: 8px; background: var(--bg-secondary); color: var(--text-primary);">
                        <option value="女性">女性</option>
                        <option value="男性">男性</option>
                        <option value="中性">中性</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>外观描述</label>
                    <textarea id="charAppearance" rows="3" placeholder="描述角色的外貌特征"></textarea>
                </div>
                
                <div class="form-group">
                    <label>性格特点</label>
                    <input type="text" id="charPersonality" placeholder="如：温柔、独立、活泼">
                </div>
                
                <div class="form-group">
                    <label>背景故事</label>
                    <textarea id="charBackground" rows="4" placeholder="描述角色的背景故事"></textarea>
                </div>
                
                <button class="btn" onclick="addCharacter()" style="width: 100%;">确认添加</button>
            `;
            document.getElementById('modalOverlay').classList.add('active');
        }

        function addCharacter() {
            const name = document.getElementById('charName').value.trim();
            const age = parseInt(document.getElementById('charAge').value) || 18;
            const gender = document.getElementById('charGender').value;
            const appearance = document.getElementById('charAppearance').value.trim();
            const personality = document.getElementById('charPersonality').value.trim();
            const background = document.getElementById('charBackground').value.trim();
            
            if (!name) {
                showNotification('请输入角色名称', 'error');
                return;
            }
            
            const character = {
                id: generateId(),
                name: name,
                isMain: true,
                baseProfile: {
                    age: age,
                    gender: gender,
                    appearance: appearance,
                    personality: personality || '未知',
                    background: background
                },
                stats: {
                    health: 100,
                    energy: 100,
                    arousal: 0,
                    affection: 50
                },
                status: '正常'
            };
            
            window.DataManager?.addCharacter(currentWorldId, character);
            closeModal();
            showNotification('角色添加成功', 'success');
            renderPage('story');
        }

        function deleteCharacter(characterId) {
            if (!confirm('确定要删除这个角色吗？')) return;
            
            window.DataManager?.deleteCharacter(currentWorldId, characterId);
            showNotification('角色已删除', 'success');
            renderPage('story');
        }

        function importCharacter() {
            if (!currentWorldId) {
                showNotification('请先选择一个世界', 'error');
                return;
            }
            
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.json';
            
            input.onchange = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                
                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const data = JSON.parse(event.target.result);
                        let characters = [];
                        
                        if (Array.isArray(data)) {
                            characters = data;
                        } else if (data.name) {
                            characters = [data];
                        } else {
                            throw new Error('无效的角色数据格式');
                        }
                        
                        let importedCount = 0;
                        characters.forEach(character => {
                            if (!character.name) {
                                return;
                            }
                            
                            character.id = generateId();
                            character.isMain = true;
                            character.worldId = currentWorldId;
                            
                            if (!character.stats) {
                                character.stats = {
                                    health: 100,
                                    energy: 100,
                                    arousal: 0,
                                    affection: 50
                                };
                            }
                            
                            window.DataManager?.addCharacter(currentWorldId, character);
                            importedCount++;
                        });
                        
                        if (importedCount > 0) {
                            showNotification(`成功导入 ${importedCount} 个角色`, 'success');
                            renderPage('story');
                        } else {
                            throw new Error('角色数据缺少名称');
                        }
                    } catch (err) {
                        showNotification('导入失败: ' + err.message, 'error');
                    }
                };
                reader.readAsText(file);
            };
            
            input.click();
        }

        function exportAllCharacters() {
            if (!currentWorldId) {
                showNotification('请先选择一个世界', 'error');
                return;
            }
            
            const characters = window.DataManager?.getMainCharacters(currentWorldId) || [];
            
            if (characters.length === 0) {
                showNotification('没有角色可导出', 'error');
                return;
            }
            
            const exportData = JSON.stringify(characters, null, 2);
            const blob = new Blob([exportData], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            
            const a = document.createElement('a');
            a.href = url;
            a.download = 'characters_' + new Date().toISOString().slice(0, 10) + '.json';
            a.click();
            
            URL.revokeObjectURL(url);
            showNotification('角色导出成功', 'success');
        }

        function showNotification(message, type = 'info') {
            const notif = document.getElementById('notification');
            notif.textContent = message;
            notif.className = 'notification active ' + type;
            setTimeout(() => {
                notif.classList.remove('active');
            }, 3000);
        }

        function showStoryLoading(text = '正在生成故事...') {
            document.getElementById('storyLoadingText').textContent = text;
            document.getElementById('storyLoadingOverlay').style.display = 'flex';
        }

        function hideStoryLoading() {
            document.getElementById('storyLoadingOverlay').style.display = 'none';
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
